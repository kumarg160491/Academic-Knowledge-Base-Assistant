version: "3.8"

services:

  ollama:
    image: ollama/ollama
    container_name: kt-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "ollama serve &
      sleep 5 &&
      ollama pull llama3.1:8b &&
      ollama pull nomic-embed-text &&
      wait"

  kt-rag-app:
    build: .
    container_name: kt-rag-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: